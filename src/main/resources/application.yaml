spring:
  application:
    name: todolist
  config:
    import: optional:classpath:application-local.yaml
  datasource:
    url: ${DB_URL:}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

app:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
      refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
      max-sessions: ${JWT_MAX_SESSIONS:1}
      issuer: ${JWT_ISSUER:todolist-api}
      audience: ${JWT_AUDIENCE:todolist-api}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000}
    headers:
      hsts-enabled: ${HSTS_ENABLED:false}
    cleanup:
      cron: ${TOKEN_CLEANUP_CRON:0 0 * * * *}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
